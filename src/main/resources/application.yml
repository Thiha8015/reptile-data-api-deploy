spring:
  datasource:
    url: jdbc:mysql://10.0.0.13:3306/reptile?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=UTC
    username: root
    password: open@2025
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 1
      maximum-pool-size: 1000
      auto-commit: true
      idle-timeout: 30000
      pool-name: MyHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    encoding: UTF-8
    enabled: true
  threads:
    virtual:
      enabled: true
  web:
    resources:
      static-locations: classpath:/META-INF/resources/, classpath:/resources/, classpath:/static/, classpath:/public/

sa:
  name: admin
  pwd: open@5202
  auto: false
  auth: true
  title: OA System
  copr: false
  exclude: /api/reptile/**

logging:
  level:
    org.mybatis: trace
    cn.xbatis: trace

